name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install pinned dependencies
        run: |
          pip install -r requirements.lock
          pip install --no-deps -e .

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Kronos vendored-copy drift check (backend vs HF Space)
        run: diff -r app/ml/kronos_src ../infrastructure/hf-space/kronos_src

      - name: Type-check (mypy)
        run: mypy app

      - name: Security lint (bandit, medium+)
        run: |
          pip install bandit
          bandit -r app -ll -q

      - name: Dependency audit (pip-audit)
        continue-on-error: true  # advisory for now; tighten before production
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock

      - name: Test (fast suite)
        run: pytest -m "not slow and not db" -q --cov=app --cov-report=term

  integration:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: findb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d findb"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/findb
      LLM_PROVIDER: fake
      LLM_FALLBACK_PROVIDER: ""
      ENABLE_AGENT_MEMORY: "false"
      ENABLE_SCHEDULER: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install pinned dependencies
        run: |
          pip install -r requirements.lock
          pip install --no-deps -e .

      - name: Bootstrap base schema (pre-existing tables)
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d findb -v ON_ERROR_STOP=1 -f ../scripts/base_schema.sql

      - name: Apply project migrations
        run: alembic upgrade head

      - name: Integration tests (db-marked)
        run: pytest -m db -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test (node:test)
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ai-fin-platform-backend:ci backend
      - name: Build slim (Render) image
        run: docker build -f backend/Dockerfile.render -t ai-fin-platform-backend:render backend
      - name: Slim image boots without torch
        run: |
          docker run --rm ai-fin-platform-backend:render python -c "
          import importlib.util, sys
          assert importlib.util.find_spec('torch') is None, 'torch leaked into the slim image'
          assert importlib.util.find_spec('sentence_transformers') is None, 'sentence-transformers leaked'
          import app.main
          print('slim image boots torch-free')
          "
