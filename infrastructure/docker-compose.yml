# Local development stack: Postgres (with pgvector) + backend API.
# Usage (from repo root):  docker compose -f infrastructure/docker-compose.yml up
# The backend reads DATABASE_URL; for local dev it points at the bundled Postgres
# instead of Supabase.

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: findb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d findb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/findb
      ENV: development
      LOG_LEVEL: INFO
      ENABLE_SCHEDULER: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
