# Production (Render) dependency lock - BASE deps only, resolved for
# Linux x86_64 / CPython 3.12 with backend/requirements.lock as constraints.
# Excludes the [local-ml] extra (torch, sentence-transformers, huggingface-hub,
# safetensors, einops) and all dev tooling: in production KRONOS_MODE=remote /
# EMBEDDINGS_MODE=remote delegate inference to the Hugging Face Space, so the
# image must stay torch-free (CI enforces this). Regenerate with pip's
# cross-platform resolver:
#   pip install --dry-run --ignore-installed --report report.json
#     --python-version 3.12 --platform manylinux_2_39_x86_64
#     --platform manylinux_2_35_x86_64 --platform manylinux_2_28_x86_64
#     --implementation cp --abi cp312 --abi abi3 --abi none
#     --only-binary=:all: -c requirements.lock -r <base-deps.txt>
# Note: pip evaluates env markers against the host, so Linux-only extras like
# uvloop are absent - same as the full image (requirements.lock has no uvloop
# either); uvicorn falls back to the asyncio loop.
